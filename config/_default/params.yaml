# Basic site info with SEO
description: "Michael Tin's website"
keywords: ["Michael Tin", "Software", "Hardware", "Technology", "Science"]
defaultAuthor: "Michael Tin"
language: "en"
shortName: "Michael Tin" # PWA
images:
  # - "/images/og-default.avif"
  - "/images/michael.jpg"

# Favicon
favicon:
  svg: "/favicon.png" # SVG format favicon (recommended)

# Author info
author:
  name: "Michael Tin"
  title: "Recent Computer Engineering Graduate from UC Riverside"
  description: "I am a recent graduate of the University of California, Riverside. I view myself as a hardworking individual who is always aspiring to learn new things and collaborate towards shared goals. Through my past experiences, I have strived to foster a better community by promoting education and outreach. I strongly believe that I will be able to apply leadership and teamwork skills and thrive in any environment. I wish to continue to learn and expand my horizons in order to benefit my community and create a positive change in the world."
  avatar: "/images/avatar.svg"
  social:
    - name: "Email"
      url: "mailto:michaeltin583@gmail.com"
      icon: "email"
    - name: "LinkedIn"
      url: "https://www.linkedin.com/in/michaeltin001/"
      icon: "linkedin"
    - name: "GitHub"
      url: "https://github.com/michaeltin001"
      icon: "github"
    - name: "X"
      url: "https://x.com/michaeltin001"
      icon: "x"

# Header configuration (modularized)
header:
  sticky: true # Enable sticky navigation bar
  logo:
    image: "favicon.png" # Logo path relative to static folder, leave empty to use site title first letter
    link: "/" # Click to home page
  # UI Components Control (header controls)
  showThemeSwitch: false # Set to false to hide theme style switcher (palette icon)
  showDarkModeSwitch: true # Set to false to hide dark mode switcher (sun/moon icon)
  showLanguageSwitch: false # Set to false to hide language switcher
  languageSwitchMode: "dropdown" # Language switch mode: "dropdown" (show panel) or "cycle" (direct cycle)

# Dock display mode
# Options: "scroll" (show on scroll up), "always" (always visible), "float" (floating button)
dock: "scroll"

# Content width
# The ,max content width is set to "56rem" by default, which is a good balance between readability and aesthetics.
# You can change it to "56rem" to make the content wider, or "48rem" to make it narrower.
contentWidth: "56rem"

# TOC (Table of Contents)
toc:
  enabled: true # Enable or disable TOC globally
  position: "center" # Options: center | side

# Default color scheme
colorScheme: "default"
themes:
  default:
    name: "Default"
    order: 1
  # default:
  #   name: "Default"
  #   order: 1
  # claude:
  #   name: "Claude"
  #   order: 2
  # bumblebee:
  #   name: "Bumblebee"
  #   order: 3
  # emerald:
  #   name: "Emerald"
  #   order: 4
  # nord:
  #   name: "Nord"
  #   order: 5
  # sunset:
  #   name: "Sunset"
  #   order: 6
  # abyss:
  #   name: "Abyss"
  #   order: 7
  # dracula:
  #   name: "Dracula"
  #   order: 8
  # amethyst:
  #   name: "Amethyst"
  #   order: 9
  # slate:
  #   name: "Slate"
  #   order: 10
  # twitter:
  #   name: "Twitter"
  #   order: 11
  # minimal:
  #   name: "Minimal"
  #   order: 12

# Home page configuration
home:
  recentPostsCount: 5 # Number of recent posts to show on the home page

  # Content order configuration - customize the order of home page sections
  # Available sections: author-section, recent-posts, featured-projects, page-content
  # You can add your custom content by creating files in `layouts/_partials/home/` folder, then add it to the list
  contentOrder:
    - author-section
    - page-content
    # - recent-posts
    - featured-projects.html

# Post configuration
post:
  showRelated: true # show related posts
  relatedPostsCount: 3 # posts number
  license:
    show: true
    author: "Hugo Narrow"
    name: "CC BY-NC-SA 4.0"
    description: "This work is licensed under a Creative Commons Attribution-NonCommercial-ShareAlike 4.0 International License. Please attribute the source, use non-commercially, and maintain the same license."
    url: "https://creativecommons.org/licenses/by-nc-sa/4.0/"
    displayName: "CC BY-NC-SA 4.0"

# Comments
comments:
  enabled: false
  # giscus, disqus, utterances, waline, artalk, twikoo
  system: "giscus"
  giscus:
    repo: "tom2almighty/hugo-narrow-giscus"
    repoId: "R_kgDOO2gwLg"
    category: "General"
    categoryId: "DIC_kwDOO2gwLs4CrEaf"
    mapping: "pathname"
    strict: "0"
    reactionsEnabled: "1"
    emitMetadata: "0"
    inputPosition: "bottom"
    theme: "preferred_color_scheme"
    lang: "en"
  disqus:
    shortname: ""
  utterances:
    repo: ""
    issueTerm: "pathname"
    label: "comment"
    theme: "preferred-color-scheme"
  waline:
    serverURL: ""
    lang: "zh-CN"
  artalk:
    server: ""
    site: ""
    locale: "zh-CN" # String|Object|"auto"
    darkMode: "auto"
    gravatar:
      mirror: "https://cravatar.cn/avatar/"
  twikoo:
    envId: ""
    region: "ap-shanghai"
    path: ""
    lang: "zh-CN"

# Analytics
analytics:
  enabled: false
  baidu:
    enabled: false
    id: "your-baidu-analytics-id"
  clarity:
    enabled: false
    id: "your-clarity-analytics-id"
  google:
    enabled: false
    id: "your-google-analytics-id"
  umami:
    enabled: false
    id: "your-umami-website-id"
    src: "https://umami.com/myscript.js"
    domains: "example.domain.com"

# KaTeX
katex:
  enabled: true
  delimiters:
    - left: "$$"
      right: "$$"
      display: true
    - left: "$"
      right: "$"
      display: false
    - left: "\\("
      right: "\\)"
      display: false
    - left: "\\["
      right: "\\]"
      display: true

# Mermaid
mermaid:
  enabled: true

# Gallery 配置
gallery:
  enabled: true
  defaultLayout: justified # justified, masonry, grid
  gap: 10
  targetRowHeight: 200
  lastRowBehavior: center # left, center, right, fill, hide
  columnWidth: 200
  columns: 4 # auto 或具体数字

# PhotoSwipe 灯箱
lightbox:
  enabled: true
  bgOpacity: 0.8
  showHideAnimationType: zoom
  showAnimationDuration: 333
  hideAnimationDuration: 333

# Code block
codeblock:
  collapse:
    enabled: true
    defaultState: expanded # expanded, collapsed
    autoCollapseLines: 30
    autoCollapseHeight: 400
    collapsedHeight: 120

# Reading progress
readingProgress:
  enabled: true
  showOnHomepage: false
